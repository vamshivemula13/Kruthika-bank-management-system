<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kruthika Bank</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">
<div class="container">
<span class="navbar-brand">🏦 Kruthika Bank</span>
</div>
</nav>

<div class="container mt-4">

<h2 class="text-center">Welcome to Kruthika Bank</h2>

<div class="row mt-4">

<div class="col-md-6">

<div class="card p-3">

<h4>Create Account</h4>

<input id="name" class="form-control mt-2" placeholder="Account Holder Name">

<input id="accountNumber" class="form-control mt-2" placeholder="Account Number">

<input id="balance" class="form-control mt-2" placeholder="Initial Balance">

<button class="btn btn-success mt-3" onclick="createAccount()">
Create Account
</button>

</div>

</div>

<div class="col-md-6">

<div class="card p-3">

<h4>Deposit / Withdraw</h4>

<input id="accNum" class="form-control mt-2" placeholder="Account Number">

<input id="amount" class="form-control mt-2" placeholder="Amount">

<button class="btn btn-primary mt-2" onclick="depositMoney()">Deposit</button>

<button class="btn btn-danger mt-2" onclick="withdrawMoney()">Withdraw</button>

</div>

</div>

</div>

<div class="card mt-4 p-3">

<h4>Check Balance</h4>

<input id="checkAcc" class="form-control mt-2" placeholder="Account Number">

<button class="btn btn-warning mt-2" onclick="checkBalance()">
Check Balance
</button>

<h5 id="balanceResult" class="mt-3"></h5>

</div>

<div class="card mt-4 p-3">

<h4>All Accounts</h4>

<table class="table table-striped">

<thead>
<tr>
<th>Name</th>
<th>Account Number</th>
<th>Balance</th>
<th>Action</th>
</tr>
</thead>

<tbody id="accountTable"></tbody>

</table>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
